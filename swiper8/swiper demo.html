<!DOCTYPE html>
<html>
    <head>
      <link rel="shortcut icon" href="/file/favicon.ico">
      <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
        <title>swiper8 demo-VKSFC</title>
        <script src="/swiper8/swiper-bundle.js"></script>
        <link rel="stylesheet" href="/swiper8/swiper-bundle.css">
    </head>
    <body>
      <style>
        .swiper {
            width: 650px;
            height: 350px;
        }  
        </style>
        <div class="swiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide">Slide 1<img src="" width="550px" height="300px"></div>
                <div class="swiper-slide">Slide 2<img src="" width="550px" height="300px"></div>
              </div>
            <!-- 如果需要分页器 -->
            <div class="swiper-pagination"></div>
            
            <!-- 如果需要导航按钮 -->
            <div class="swiper-button-prev"></div>
            <div class="swiper-button-next"></div>
        </div>
        <script>
            var mySwiper = new Swiper ('.swiper', {

              loop: true, // 循环模式选项
    
              autoplay: true, //自动轮播选项
              
              // 如果需要分页器
              pagination: {
                el: '.swiper-pagination',
              },
              
              // 如果需要前进后退按钮
              navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
              },
            })        
        </script>
</html>
