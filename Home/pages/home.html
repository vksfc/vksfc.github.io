<!DOCTYPE html>
<html lang="zh-cn">
    <head>
        <meta charset="UTF-8">
        <link rel="shortcut icon" href="/file/favicon.ico">
        <link rel="stylesheet" type="text/css" href="/yongyin/yongyin1.css">
        <script src="/yongyin/yongyin1.js"></script>
        <script src="/swiper8/swiper-bundle.js"></script>
        <link rel="stylesheet" href="/swiper8/swiper-bundle.css">
    </head>
    <body>
        <h1>松氢官网</h1>
        <p>©Pine hydrogen All right reserved.</p>
        <div style="margin-top:10px">
            <button type="button" class="yongyin" onclick="javascript:location.reload()" style="width:100px; height:30px;">刷新</button>
        </div>
        <style>
        .swiper {
            width: 650px;
            height: 350px;
        }  
        </style>
        <div class="swiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide">Slide 1<img src="/file/Carousel map1/img1.png" width="550px" height="300px"></div>
                <div class="swiper-slide">Slide 2<img src="/file/Carousel map1/img2.png" width="550px" height="300px"></div>
                <!--
                    <div class="swiper-slide">Slide 3<img src="/file/Carousel map1/img3.png" width="550px" height="300px"></div>
                    <div class="swiper-slide">Slide 4<img src="/file/Carousel map1/img4.png" width="550px" height="300px"></div>
                    <div class="swiper-slide">Slide 5<img src="/file/Carousel map1/img5.png" width="550px" height="300px"></div>
                    <div class="swiper-slide">Slide 6<img src="/file/Carousel map1/img6.png" width="550px" height="300px"></div>
                    <div class="swiper-slide">Slide 7<img src="/file/Carousel map1/img7.png" width="550px" height="300px"></div>
                -->
            </div>
            <!-- 如果需要分页器 -->
            <div class="swiper-pagination"></div>
            
            <!-- 如果需要导航按钮 -->
            <div class="swiper-button-prev"></div>
            <div class="swiper-button-next"></div>
        </div>
        <script>
            var mySwiper = new Swiper ('.swiper', {
        
              loop: true, // 循环模式选项
        
              autoplay: true, //自动轮播选项
              
              // 如果需要分页器
              pagination: {
                el: '.swiper-pagination',
              },
              
              // 如果需要前进后退按钮
              navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
              },
            })        
        </script>
    </body>
</html>
