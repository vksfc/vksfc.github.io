        <title>forge安装教程</title>
        <link rel="stylesheet" type="text/css" href="/yongyin/yongyin1.css">
        <script>
            function back(){ 
                window.location.href=" /mc/java/mcjava.html ";
            }
            </script>
    </head>
    <body>
        <div style="margin-top:10px">
            <button type="button" class="yongyin" onclick="back()" style="width:100px; height:30px;">返回</button>
        </div>
        <h1>方法1：直接双击打开，如果不行，请尝试方法2</h1>
        <h1>方法2：此方法仅适合Windows用户！</h1>
        <h3>首先，你要下载forge安装包，然后在桌面新建文本文档(其他位置也可以)，名字随便，后缀必须是.bat</h3>
        <h3>鼠标右键文件，选择编辑，输入以下内容:</h3>
        <p>@echo off</p>
        <p>java -Xmx2g -Xms2g -jar 把注释删了写forge安装包文件名称，要后缀</p>
        <p>pause</p>
        <h3>保存，然后把安装包复制在这个文件的同级目录</h3>
        <h3>然后双击bat文件就会弹出安装界面</h3>
        <h1>如果无法正常安装可能是没有Java，安装Java后即可</h1>    </body>
</html>
