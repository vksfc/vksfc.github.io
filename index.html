            <style>
                
                /* 弹窗背景样式 */
                .modal {
                    display: none; /* 默认隐藏 */
                    position: fixed;
                    z-index: 1;
                    left: 0;
                    top: 0;
                    width: 100%;
                    height: 100%;
                    overflow: auto;
                    background-color: rgba(0, 0, 0, 0.4); /* 背景颜色带有透明度 */
                }
        
                /* 弹窗内容框样式 */
                .modal-content {
                    background-color: #fefefe;
                    margin: 15% auto; /* 居中显示 */
                    padding: 20px;
                    border: 1px solid #888;
                    width: 400px;
                }
        
                /* 关闭按钮样式 */
                .close {
                    color: #aaa;
                    float: right;
                    font-size: 28px;
                    font-weight: bold;
                }
        
                /* 鼠标悬停在关闭按钮上时的样式 */
                .close:hover,
                .close:focus {
                    color: black;
                    text-decoration: none;
                    cursor: pointer;
                }
            </style>
            <script>
                // JavaScript 函数用于打开弹窗
                function openModal() {
                    document.getElementById("myModal").style.display = "block";
                }
        
                // JavaScript 函数用于关闭弹窗
                function closeModal() {
                    document.getElementById("myModal").style.display = "none";
                }
            </script>
